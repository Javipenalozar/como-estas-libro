[build]
  publish = "site"
  command = ""
  functions = "netlify/functions"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/downloads/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/libro"
  to = "/"
  status = 301

[[redirects]]
  from = "/como-estas"
  to = "/"
  status = 301
